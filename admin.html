<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Laser Beauty - Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: #f3f0f7;
  margin: 0;
}

header {
  background: purple;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: purple;
  color: white;
  border: none;
}

.item {
  background: #eee;
  padding: 10px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<header>Laser Beauty - Painel</header>

<div class="container">

<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="card">
<h3>Chamar Paciente</h3>
<input id="nome" placeholder="Nome">
<input id="consultorio" placeholder="Consultório">
<input id="profissional" placeholder="Profissional">
<button onclick="add()">Chamar</button>
</div>

<div class="card">
<h3>Fila</h3>
<div id="lista"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ezfxemgrwkrakxcwyrcl.supabase.co",
  "sb_publishable_ikTlRly6-KxFUk-7FB_6sQ_VAfUjge_"
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) alert("Erro no login");
}

async function add() {
  const nome = document.getElementById("nome").value;
  const consultorio = document.getElementById("consultorio").value;
  const profissional = document.getElementById("profissional").value;

  await supabase.from("pacientes").insert([
    { nome, consultorio, profissional }
  ]);
}

async function carregar() {
  const { data } = await supabase
    .from("pacientes")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";
  data.forEach(p => {
    html += `<div class="item">
      ${p.nome} - ${p.consultorio} (${p.profissional})
    </div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

setInterval(carregar, 2000);
</script>

</body>
</html>
