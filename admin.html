<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Beauty - Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f3f0f7;
}

header {
  background: linear-gradient(90deg, #6a0dad, #a64dff);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* MOBILE VOLTA AO NORMAL */
@media (max-width: 600px) {
  .container {
    display: block;
    padding: 15px;
  }
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 500px;
  margin: auto;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #6a0dad;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.logout {
  background: red;
}

.item {
  background: #eee;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.remover {
  background: red;
  padding: 5px 10px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<header>Laser Beauty - Controle do Painel</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema" class="hidden">

  <div class="card">
    <h3>Chamar Paciente</h3>
    <input id="nome" placeholder="Nome do paciente">
    <input id="consultorio" placeholder="Consultório">
    <input id="profissional" placeholder="Profissional">
    <button onclick="add()">Chamar</button>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <div class="card">
    <h3>Fila</h3>
    <div id="lista"></div>
  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ezfxemgrwkrakxcwyrcl.supabase.co",
  "sb_publishable_ikTlRly6-KxFUk-7FB_6sQ_VAfUjge_"
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    alert("Preencha email e senha");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    alert("Erro: " + error.message);
  } else {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("sistema").classList.remove("hidden");
    carregar();
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function add() {
  const nome = document.getElementById("nome").value;
  const consultorio = document.getElementById("consultorio").value;
  const profissional = document.getElementById("profissional").value;

  if (!nome || !consultorio || !profissional) {
    alert("Preencha todos os campos");
    return;
  }

  await supabaseClient.from("pacientes").insert([
    { nome, consultorio, profissional }
  ]);

  document.getElementById("nome").value = "";
  document.getElementById("consultorio").value = "";
  document.getElementById("profissional").value = "";
}

async function remover(id) {
  await supabaseClient.from("pacientes").delete().eq("id", id);
}

async function carregar() {
  const { data } = await supabaseClient
    .from("pacientes")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";
  data.forEach(p => {
    html += `
      <div class="item">
        <span>${p.nome} - ${p.consultorio} (${p.profissional})</span>
        <span class="remover" onclick="remover('${p.id}')">X</span>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

setInterval(() => {
  const sistemaVisivel = !document.getElementById("sistema").classList.contains("hidden");
  if (sistemaVisivel) carregar();
}, 2000);
</script>

</body>
</html>
