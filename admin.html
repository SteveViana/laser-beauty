<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Beauty - Admin</title>

<!-- SUPABASE CORRETO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f3f0f7;
}

header {
  background: linear-gradient(90deg, #6a0dad, #a64dff);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 400px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #6a0dad;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<header>Laser Beauty - Controle do Painel</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema" class="hidden">

  <div class="card">
    <h3>Chamar Paciente</h3>
    <input id="nome" placeholder="Nome do paciente">
    <input id="consultorio" placeholder="Consultório">
    <input id="profissional" placeholder="Profissional">
    <button onclick="add()">Chamar</button>
  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ezfxemgrwkrakxcwyrcl.supabase.co",
  "sb_publishable_ikTlRly6-KxFUk-7FB_6sQ_VAfUjge_"
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    alert("Preencha email e senha");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    alert("Erro: " + error.message);
  } else {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("sistema").classList.remove("hidden");
  }
}

async function add() {
  const nome = document.getElementById("nome").value;
  const consultorio = document.getElementById("consultorio").value;
  const profissional = document.getElementById("profissional").value;

  if (!nome || !consultorio || !profissional) {
    alert("Preencha todos os campos");
    return;
  }

  await supabaseClient.from("pacientes").insert([
    { nome, consultorio, profissional }
  ]);

  document.getElementById("nome").value = "";
  document.getElementById("consultorio").value = "";
  document.getElementById("profissional").value = "";
}
</script>

</body>
</html>
