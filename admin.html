
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Beauty - Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f3f0f7;
}

header {
  background: linear-gradient(90deg, #6a0dad, #a64dff);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #6a0dad;
  color: white;
  font-size: 16px;
}

.item {
  background: #eee;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.hidden { display: none; }
</style>
</head>

<body>

<header>Laser Beauty - Painel</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA (ESCONDIDO ATÉ LOGIN) -->
<div id="sistema" class="hidden">

  <div class="card">
    <h3>Chamar Paciente</h3>
    <input id="nome" placeholder="Nome do paciente">
    <input id="consultorio" placeholder="Consultório">
    <input id="profissional" placeholder="Profissional">
    <button onclick="add()">Chamar</button>
  </div>

  <div class="card">
    <h3>Fila</h3>
    <div id="lista"></div>
  </div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ezfxemgrwkrakxcwyrcl.supabase.co",
  "sb_publishable_ikTlRly6-KxFUk-7FB_6sQ_VAfUjge_"
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    alert("Erro no login");
  } else {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("sistema").classList.remove("hidden");
    carregar();
  }
}

async function add() {
  const nome = document.getElementById("nome").value;
  const consultorio = document.getElementById("consultorio").value;
  const profissional = document.getElementById("profissional").value;

  if (!nome || !consultorio || !profissional) return;

  await supabase.from("pacientes").insert([
    { nome, consultorio, profissional }
  ]);

  document.getElementById("nome").value = "";
  document.getElementById("consultorio").value = "";
  document.getElementById("profissional").value = "";
}

async function carregar() {
  const { data } = await supabase
    .from("pacientes")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";
  data.forEach(p => {
    html += `<div class="item">${p.nome} - ${p.consultorio} (${p.profissional})</div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

setInterval(() => {
  const sistemaVisivel = !document.getElementById("sistema").classList.contains("hidden");
  if (sistemaVisivel) carregar();
}, 2000);
</script>

</body>
</html>
