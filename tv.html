<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Beauty - Painel TV (Voz)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f3f0f7; /* Fundo claro do painel admin */
  color: #333;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden; /* Evita barras de rolagem na TV */
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: linear-gradient(90deg, #6a0dad, #a64dff); /* Mesma cor do painel admin */
  padding: 30px;
  text-align: center;
  font-size: 50px;
  font-weight: bold;
  letter-spacing: 2px;
  color: white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.container {
  display: grid;
  grid-template-columns: 2.5fr 1fr;
  gap: 30px;
  padding: 40px;
  flex: 1;
}

.card {
  background: white; /* Mesma cor dos cards do painel admin */
  padding: 30px;
  border-radius: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
}

h2 {
  color: #6a0dad; /* Roxo principal do painel admin */
  text-transform: uppercase;
  font-size: 28px;
  margin-top: 0;
  border-bottom: 2px solid #eee;
  padding-bottom: 15px;
}

.chamado-principal {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border: 5px solid #a64dff; /* Roxo mais claro para destaque */
  border-radius: 25px;
  background: white;
  margin: 20px 0;
  animation: pulso 2s infinite;
}

@keyframes pulso {
  0% { box-shadow: 0 0 0 0 rgba(166, 77, 255, 0.2); }
  70% { box-shadow: 0 0 0 30px rgba(166, 77, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(166, 77, 255, 0); }
}

.chamado-principal h1 {
  font-size: 90px;
  margin: 0;
  color: #333;
  text-align: center;
}

.info-destaque {
  font-size: 45px;
  color: #6a0dad;
  font-weight: bold;
  margin-top: 20px;
}

.lista-espera {
  margin-top: 20px;
  font-size: 24px;
}

.lista-item {
  padding: 15px;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  color: #666;
}

.ofertas p {
  font-size: 32px;
  margin: 20px 0;
  padding: 15px;
  background: #f8f5fb;
  border-radius: 15px;
  text-align: center;
  border-left: 8px solid #6a0dad;
  color: #333;
}
</style>
</head>

<body>

<header>LASER BEAUTY</header>

<div class="container">

  <div class="card">
    <h2>Chamando agora</h2>
    
    <div class="chamado-principal">
      <h1 id="nome">Aguardando...</h1>
      <div id="info" class="info-destaque"></div>
    </div>

    <div style="margin-top: 20px;">
      <h3 style="color: #bbb;">Últimos chamados:</h3>
      <div id="lista" class="lista-espera"></div>
    </div>
  </div>

  <div class="card ofertas">
    <h2>Ofertas Especiais</h2>
    <p>Combo Básico<br><strong style="color: #6a0dad;">R$ 699</strong></p>
    <p>Combo Premium<br><strong style="color: #6a0dad;">R$ 899</strong></p>
    <p>Limpeza Especial<br><strong style="color: #6a0dad;">R$ 199</strong></p>
  </div>

</div>

<script>
// Usando o supabase do objeto global (versão 2)
const supabaseClient = supabase.createClient(
  "https://ezfxemgrwkrakxcwyrcl.supabase.co",
  "sb_publishable_ikTlRly6-KxFUk-7FB_6sQ_VAfUjge_"
);

// Variável para armazenar o ID do último paciente chamado e evitar repetições da voz
let ultimoIdChamado = null;

async function carregar() {
  try {
    const { data, error } = await supabaseClient
      .from("pacientes")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(6); // Pega os 6 últimos para ter o atual + 5 na fila

    if (error) throw error;

    if (data && data.length > 0) {
      const pacienteAtual = data[0];
      
      // Atualiza o destaque ("Chamando agora")
      document.getElementById("nome").innerText = pacienteAtual.nome;
      document.getElementById("info").innerText = 
        `CONSULTÓRIO ${pacienteAtual.consultorio} - ${pacienteAtual.profissional}`;

      // LÓGICA DA FILA CORRIGIDA:
      // Pega os pacientes restantes (penúltimo, antepenúltimo, etc.)
      const ultimosChamados = data.slice(1);
      // REVERTE a ordem para que o penúltimo chamado fique no topo da lista secundária
      ultimosChamados.reverse();

      let html = "";
      ultimosChamados.forEach(p => {
        html += `
          <div class="lista-item">
            <span>${p.nome}</span>
            <span>Sala ${p.consultorio}</span>
          </div>`;
      });
      document.getElementById("lista").innerHTML = html;

      // LÓGICA DA VOZ:
      // Verifica se o paciente atual é diferente do último que "falamos"
      if (pacienteAtual.id !== ultimoIdChamado) {
        // Se for um novo paciente, fala o nome dele
        falarNomePaciente(pacienteAtual);
        // Atualiza o ID armazenado
        ultimoIdChamado = pacienteAtual.id;
      }
    }
  } catch (err) {
    console.error("Erro ao buscar dados:", err);
  }
}

function falarNomePaciente(paciente) {
  // Cancela qualquer fala que esteja em andamento para não encavalar
  window.speechSynthesis.cancel();

  // Cria a frase que será dita
  const frase = `Atenção: ${paciente.nome}. Por favor, comparecer ao Consultório ${paciente.consultorio}, com Doutor ou Doutora ${paciente.profissional}.`;
  
  // Cria o objeto de fala
  const utterance = new SpeechSynthesisUtterance(frase);
  
  // Define o idioma para português do Brasil
  utterance.lang = 'pt-BR';
  
  // Opcional: Ajustar velocidade (0.1 a 10, padrão é 1) e tom (0 a 2, padrão é 1)
  utterance.rate = 0.9; // Um pouco mais lento para clareza na TV
  utterance.pitch = 1;

  // Tenta encontrar uma voz feminina em português, se disponível
  const voices = window.speechSynthesis.getVoices();
  const femaleVoice = voices.find(voice => voice.lang === 'pt-BR' && voice.name.includes('Feminina'));
  if (femaleVoice) {
    utterance.voice = femaleVoice;
  }

  // Executa a fala
  window.speechSynthesis.speak(utterance);
}

// Garante que as vozes sejam carregadas antes de tentar usá-las
window.speechSynthesis.onvoiceschanged = () => {
  // Opcional: pode logar as vozes disponíveis para debugar
  // console.log(window.speechSynthesis.getVoices());
};

// Atualiza a cada 3 segundos
setInterval(carregar, 3000);

// Carrega ao abrir a página
carregar();
</script>

</body>
</html>
