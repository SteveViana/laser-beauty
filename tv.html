<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Beauty - Painel TV Amplo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f3f0f7;
  color: #333;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: linear-gradient(90deg, #6a0dad, #a64dff);
  padding: 15px;
  text-align: center;
  font-size: 60px;
  font-weight: bold;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.container {
  display: grid;
  grid-template-columns: 3fr 1fr; /* 75% para chamadas e 25% para promoções */
  gap: 20px;
  padding: 20px;
  flex: 1;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 40px;
  box-shadow: 0 5px 25px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
}

/* LADO ESQUERDO - FOCO TOTAL NO PACIENTE */
.chamado-principal {
  flex: 1.5; /* Dá mais peso vertical ao destaque */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border: 12px solid #a64dff;
  border-radius: 45px;
  margin: 10px 0 25px 0;
  background: #fff;
  animation: pulso 2s infinite;
}

@keyframes pulso {
  0% { box-shadow: 0 0 0 0 rgba(166, 77, 255, 0.4); }
  70% { box-shadow: 0 0 0 40px rgba(166, 77, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(166, 77, 255, 0); }
}

#nome { 
    font-size: 130px; /* Nome massivo para ocupar a tela */
    margin: 0; 
    text-align: center; 
    line-height: 1; 
    font-weight: 900;
    text-transform: uppercase;
}

.info-destaque { 
    font-size: 65px; 
    color: #6a0dad; 
    font-weight: bold; 
    margin-top: 20px; 
}

.titulo-ultimos {
    color: #6a0dad;
    font-size: 32px;
    margin-bottom: 15px;
    font-weight: bold;
    text-transform: uppercase;
    border-bottom: 3px solid #f3f0f7;
}

.lista-item {
  padding: 15px 0;
  border-bottom: 2px solid #f3f0f7;
  display: flex;
  justify-content: space-between;
  font-size: 45px; /* Aumentado para visibilidade */
  color: #666;
  font-weight: 600;
}

.lista-item span:last-child {
    color: #a64dff;
    font-weight: bold;
}

/* LADO DIREITO - FILEIRA DE PROMOÇÕES */
.ofertas {
  text-align: right; 
  padding: 20px;
  justify-content: space-between; /* Espalha as promos verticalmente */
}

.ofertas h2 {
    font-size: 32px;
    margin-top: 0;
    color: #6a0dad;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
}

.promo-item {
  border-right: 10px solid #6a0dad; 
  padding-right: 15px;
  margin-bottom: 20px;
}

.promo-item strong {
  font-size: 28px;
  color: #6a0dad;
  display: block;
}

.promo-item small {
  font-size: 18px;
  color: #555;
  display: block;
}

.preco-destaque {
  font-size: 38px;
  color: #27ae60;
  font-weight: bold;
}

/* LETREIRO */
.letreiro {
    background: #6a0dad;
    color: white;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    overflow: hidden;
    white-space: nowrap;
    border-radius: 20px;
    margin-top: 10px;
}

.letreiro span {
    display: inline-block;
    padding-left: 100%;
    animation: moverLetreiro 30s linear infinite;
}

@keyframes moverLetreiro {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<header>LASER BEAUTY</header>

<div class="container">

  <div class="card">
    <h2 style="color: #6a0dad; font-size: 35px; margin: 0 0 10px 0;">Chamando agora:</h2>
    
    <div class="chamado-principal">
      <h1 id="nome">...</h1>
      <div id="info" class="info-destaque"></div>
    </div>
    
    <div>
      <div class="titulo-ultimos">Últimos chamados:</div>
      <div id="lista"></div>
    </div>
  </div>

  <div class="card ofertas">
    <div>
        <h2>Combos</h2>
        
        <div class="promo-item">
            <strong>TUDÃO</strong>
            <small>Completo</small>
            <span class="preco-destaque">10x 89,99</span>
        </div>

        <div class="promo-item">
            <strong>BÁSICO</strong>
            <small>Essencial</small>
            <span class="preco-destaque">10x 69,99</span>
        </div>

        <div class="promo-item">
            <strong>PREMIUM</strong>
            <small>Full Body</small>
            <span class="preco-destaque">10x 189,99</span>
        </div>
    </div>

    <div class="letreiro">
        <span>Não deixe de participar do sorteio da cesta de chocolates e um botox. Para cada pessoa indicada você ganha 1 papel do sorteio.</span>
    </div>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ezfxemgrwkrakxcwyrcl.supabase.co",
  "sb_publishable_ikTlRly6-KxFUk-7FB_6sQ_VAfUjge_"
);

let ultimoIdChamado = null;

async function carregar() {
  try {
    const { data, error } = await supabaseClient
      .from("pacientes")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(4); // Reduzi para 4 para manter os nomes grandes sem scroll

    if (error) throw error;

    if (data && data.length > 0) {
      const atual = data[0];
      
      document.getElementById("nome").innerText = atual.nome;
      document.getElementById("info").innerText = `SALA ${atual.consultorio} - ${atual.profissional}`;

      let html = "";
      const filaSecundaria = data.slice(1); 
      
      filaSecundaria.forEach(p => {
        html += `
          <div class="lista-item">
            <span>${p.nome}</span>
            <span>SALA ${p.consultorio}</span>
          </div>`;
      });
      document.getElementById("lista").innerHTML = html;

      if (atual.id !== ultimoIdChamado) {
        falarHumano(atual);
        ultimoIdChamado = atual.id;
      }
    }
  } catch (err) { console.error(err); }
}

function falarHumano(p) {
  window.speechSynthesis.cancel();
  const texto = `${p.nome}. Consultório ${p.consultorio}. Profissional ${p.profissional}.`;
  const msg = new SpeechSynthesisUtterance(texto);
  msg.lang = 'pt-BR';
  msg.rate = 0.8; 

  const vozes = window.speechSynthesis.getVoices();
  const vozHumana = vozes.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Natural')));
  if (vozHumana) msg.voice = vozHumana;

  window.speechSynthesis.speak(msg);
}

window.speechSynthesis.onvoiceschanged = carregar;
setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
