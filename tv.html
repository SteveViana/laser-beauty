<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Beauty - Painel TV</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f3f0f7;
  color: #333;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: linear-gradient(90deg, #6a0dad, #a64dff);
  padding: 10px;
  text-align: center;
  font-size: 50px;
  font-weight: bold;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* LETREIRO NO TOPO */
.letreiro {
    background: #6a0dad;
    color: white;
    padding: 8px 0;
    font-size: 24px;
    font-weight: bold;
    overflow: hidden;
    white-space: nowrap;
    border-bottom: 4px solid #a64dff;
}

.letreiro span {
    display: inline-block;
    padding-left: 100%;
    animation: moverLetreiro 30s linear infinite;
}

@keyframes moverLetreiro {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

.container {
  display: grid;
  /* Proporção ajustada para 3:1 para caber bem em qualquer navegador */
  grid-template-columns: 3fr 1fr; 
  gap: 15px;
  padding: 15px;
  flex: 1;
  overflow: hidden;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 30px;
  box-shadow: 0 5px 25px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
}

/* LADO ESQUERDO - CHAMADA */
.chamado-principal {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border: 10px solid #a64dff;
  border-radius: 40px;
  margin: 10px 0 20px 0;
  background: #fff;
  animation: pulso 2s infinite;
}

@keyframes pulso {
  0% { box-shadow: 0 0 0 0 rgba(166, 77, 255, 0.4); }
  70% { box-shadow: 0 0 0 30px rgba(166, 77, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(166, 77, 255, 0); }
}

#nome { 
    font-size: 100px;
    margin: 0; 
    text-align: center; 
    line-height: 1; 
    font-weight: 900;
    text-transform: uppercase;
}

.info-destaque { 
    font-size: 50px; 
    color: #6a0dad; 
    font-weight: bold; 
    margin-top: 15px; 
}

.titulo-ultimos {
    color: #6a0dad;
    font-size: 24px;
    margin-bottom: 10px;
    font-weight: bold;
    text-transform: uppercase;
    border-bottom: 3px solid #f3f0f7;
}

.lista-item {
  padding: 8px 0;
  border-bottom: 2px solid #f3f0f7;
  display: flex;
  justify-content: space-between;
  font-size: 34px;
  color: #777;
  font-weight: 600;
}

/* LADO DIREITO - COMBOS */
.ofertas {
  padding: 15px;
  border-right: 12px solid #6a0dad;
  background: #fff;
}

.ofertas h2 {
    font-size: 32px;
    margin-top: 0;
    color: #6a0dad;
    border-bottom: 4px solid #6a0dad;
    padding-bottom: 10px;
    text-align: center;
    text-transform: uppercase;
}

.combos-lista {
    display: flex;
    flex-direction: column;
    gap: 25px;
    margin-top: 15px;
}

.promo-item {
  text-align: center;
  border-bottom: 1px solid #f3f0f7;
  padding-bottom: 15px;
}

.promo-item strong {
